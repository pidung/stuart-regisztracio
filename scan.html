<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jegyellenőrzés</title>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            background:#f5f5f5;
            margin:0;
            padding:20px;
        }

        h1{
            color:#333;
        }

        #reader{
            width:320px;
            margin:20px auto;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            padding:15px;
            border-radius:10px;
        }

        .ok{
            background:#d4edda;
            color:#155724;
        }

        .bad{
            background:#f8d7da;
            color:#721c24;
        }
    </style>
</head>

<body>

<div id="result">
Várakozás QR-kódra...
</div>
    
<div id="reader"></div>

<script src="scan.js"></script>

</body>
</html>
